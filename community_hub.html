<!--
════════════════════════════════════════════════════════════════════
 CARDINAL — COMMUNITY HUB
 v2026-07-23 · Community's own dashboard view
────────────────────────────────────────────────────────────────────
 The Community CRM's landing surface. Mirrors the pattern used by
 Cardinal Truth for Insurance — a full-view section injected into
 the DOM, shown/hidden via hideAllViews() coordination.

 LAYOUT (top to bottom)
   1. Community banner (green/beige, matches portal palette)
   2. PIPELINE STRIP — sticky at top of the view, counts per stage
      in bidding vocabulary (Bid Requested / Submitted / Awarded …)
   3. NEEDS ATTENTION card — Bids to submit, bids awaiting decision,
      awards to schedule. Each row opens a drilldown modal with the
      matching projects.
   4. PARTNERS grid — grouped by non-profit vs property manager,
      active-job count per partner. Clicking a partner opens a
      drilldown modal with their active projects. "Manage Partners"
      tile opens the directory.

 DATA
   Pulled from window.cacheProjects filtered to projClaimType ==
   'community', joined against window.CardinalCommunityPartners.
   No new tables, no new Supabase queries.

 NAV
   Adds a "Community" nav option to the burger menu when the current
   portal is Community or All. Clicking shows the hub. Uses the app's
   existing hideAllViews() so navigating anywhere else hides the hub
   cleanly.

 INSTALL: paste after community_stages.html. No SQL required.
════════════════════════════════════════════════════════════════════
-->

<script id="cr-chub-script">
(function () {
  'use strict';

  // Stored -> display label (matches community_stages.html)
  var LABEL = {
    'Lead':'Bid Requested', 'Prospect':'Bid Submitted', 'Approved':'Awarded',
    'Scheduled':'Scheduled', 'Completed':'Build Complete', 'Invoiced':'Invoiced',
    'Closed':'Closed', 'Lost':'Not Awarded'
  };
  var STAGES_SHOW = ['Lead','Prospect','Approved','Scheduled','Completed','Invoiced'];

  function esc(s){
    return String(s == null ? '' : s).replace(/[<>&"']/g, function(c){
      return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function typeLabel(t){
    return t === 'property_manager' ? 'Property Manager' : t === 'nonprofit' ? 'Non-profit' : t;
  }
  function projClaimType(pr){
    try{ return window.projClaimType ? window.projClaimType(pr) : 'unknown'; }
    catch(e){ return 'unknown'; }
  }
  function partnerIdOf(pr){
    try{
      var ck = window.parseCkAll ? window.parseCkAll(pr) : {};
      return (ck && ck.lead && ck.lead.partner_id) || null;
    }catch(e){ return null; }
  }
  function isActive(pr){
    var s = String(pr.stage || '');
    return s !== 'Closed' && s !== 'Lost';
  }
  function communityProjects(){
    var all = window.cacheProjects || [];
    return all.filter(function(pr){ return projClaimType(pr) === 'community'; });
  }

  // ── View element (created on first show) ──────────────────
  function ensureView(){
    var v = document.getElementById('communityHubView');
    if(v) return v;
    v = document.createElement('section');
    v.id = 'communityHubView';
    v.innerHTML =
      '<div class="cr-chub-banner">' +
        '<button class="cr-chub-back" data-act="back">&larr; Home</button>' +
        '<h1>Community <span>Partnership</span></h1>' +
        '<p>Bids, awards, and partner portfolios in one place. ' +
           'Non-profits Cardinal bids on and property managers with recurring work.</p>' +
      '</div>' +
      '<div class="cr-chub-pipeline"><div class="rail" id="chubPipe"></div></div>' +
      '<div class="cr-chub-wrap">' +
        '<div class="cr-chub-card" id="chubAttn">' +
          '<h3>Needs Attention</h3>' +
          '<div id="chubAttnBody"></div>' +
        '</div>' +
        '<div class="cr-chub-card" id="chubPartners">' +
          '<h3>Partners <span class="cr-chub-total" id="chubPTotal"></span></h3>' +
          '<div id="chubPartnersBody"></div>' +
          '<button class="cr-chub-manage" data-act="manage">Manage Partners &rarr;</button>' +
        '</div>' +
        '<div class="cr-chub-card" id="chubClients">' +
          '<h3>Clients <span class="cr-chub-total" id="chubClientsTotal"></span></h3>' +
          '<input type="text" class="cr-chub-search" id="chubClientsSearch" ' +
            'placeholder="Search name or address\u2026" autocomplete="off" />' +
          '<div id="chubClientsBody"></div>' +
        '</div>' +
      '</div>';
    document.body.appendChild(v);

    v.querySelector('[data-act="back"]').onclick = function(){
      if(typeof window.hideAllViews === 'function') window.hideAllViews();
      if(typeof window.renderHome === 'function') window.renderHome();
      var main = document.getElementById('mainView') || window.mainView;
      if(main) main.style.display = '';
    };
    v.querySelector('[data-act="manage"]').onclick = function(){
      if(window.CardinalCommunityPartners) window.CardinalCommunityPartners.openDirectory();
    };
    // Live search — debounced so typing feels instant without thrashing renders
    var searchEl = v.querySelector('#chubClientsSearch');
    if(searchEl){
      var searchTimer = null;
      searchEl.addEventListener('input', function(){
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function(){
          renderClients(communityProjects());
        }, 120);
      });
    }
    return v;
  }

  // ── Render pipeline strip ─────────────────────────────────
  function renderPipeline(projs){
    var host = document.getElementById('chubPipe');
    if(!host) return;
    var counts = {};
    projs.forEach(function(p){ counts[p.stage] = (counts[p.stage] || 0) + 1; });
    host.innerHTML = STAGES_SHOW.map(function(s){
      var n = counts[s] || 0;
      return '<div class="cr-chub-pcell' + (n ? ' active' : '') + '" data-stage="' + esc(s) + '">' +
               '<div class="k">' + esc(LABEL[s] || s) + '</div>' +
               '<div class="v' + (n ? '' : ' zero') + '">' + n + '</div>' +
             '</div>';
    }).join('');
    host.querySelectorAll('.cr-chub-pcell').forEach(function(cell){
      cell.onclick = function(){
        var stage = cell.dataset.stage;
        var matches = projs.filter(function(p){ return p.stage === stage; });
        openList(LABEL[stage] || stage, matches);
      };
    });
  }

  // ── Render needs-attention card ───────────────────────────
  function renderNeedsAttention(projs){
    var host = document.getElementById('chubAttnBody');
    if(!host) return;
    var toSubmit = projs.filter(function(p){ return p.stage === 'Lead'; });
    var awaiting = projs.filter(function(p){ return p.stage === 'Prospect'; });
    var toSched  = projs.filter(function(p){ return p.stage === 'Approved'; });
    var rows = [
      { key:'submit',  title:'Bids to submit',        desc:'Prep and send the bid package',            list:toSubmit },
      { key:'waiting', title:'Bids awaiting decision', desc:'Follow up if it\u2019s been a while',     list:awaiting },
      { key:'sched',   title:'Awards to schedule',     desc:'Get these on the production calendar',    list:toSched  },
    ];
    host.innerHTML = rows.map(function(r){
      var n = r.list.length;
      return '<div class="cr-chub-nrow' + (n ? '' : ' done') + '" data-key="' + r.key + '">' +
               '<div>' +
                 '<div class="nk">' + esc(r.title) + '</div>' +
                 '<div class="ndesc">' + esc(r.desc) + '</div>' +
               '</div>' +
               '<div class="nv' + (n ? '' : ' zero') + '">' + n + '</div>' +
             '</div>';
    }).join('');
    host.querySelectorAll('.cr-chub-nrow').forEach(function(row){
      row.onclick = function(){
        var r = rows.filter(function(x){ return x.key === row.dataset.key; })[0];
        if(!r) return;
        openList(r.title, r.list);
      };
    });
  }

  // ── Render partners card ──────────────────────────────────
  function renderPartners(projs){
    var host = document.getElementById('chubPartnersBody');
    if(!host) return;
    var partners = (window.CardinalCommunityPartners && window.CardinalCommunityPartners.list())
                    ? window.CardinalCommunityPartners.list() : [];
    var byPid = {};
    projs.filter(isActive).forEach(function(p){
      var pid = partnerIdOf(p);
      if(!pid) return;
      (byPid[pid] = byPid[pid] || []).push(p);
    });
    var totalPartners = partners.length;
    var t = document.getElementById('chubPTotal');
    if(t) t.textContent = totalPartners ? (totalPartners + ' total') : '';

    if(!totalPartners){
      host.innerHTML =
        '<div class="cr-chub-empty">No partners yet.' +
          '<small>Tap "Manage Partners" below to add Habitat, ReBuild, DHRN, or a property manager.</small>' +
        '</div>';
      return;
    }
    function grp(label, arr){
      if(!arr.length) return '';
      var rows = arr.map(function(p){
        var jobs = byPid[p.id] || [];
        return '<div class="cr-chub-prow" data-pid="' + esc(p.id) + '">' +
                 '<div>' +
                   '<div class="pname">' + esc(p.name) + '</div>' +
                   (p.contact_name ? '<div class="pmeta">' + esc(p.contact_name) + '</div>' : '') +
                 '</div>' +
                 '<div class="pcount' + (jobs.length ? '' : ' zero') + '">' + jobs.length +
                   '<small>' + (jobs.length === 1 ? 'active' : 'active') + '</small>' +
                 '</div>' +
               '</div>';
      }).join('');
      return '<div class="cr-chub-pgroup"><h4>' + esc(label) + '</h4>' + rows + '</div>';
    }
    var non = partners.filter(function(p){ return p.partner_type === 'nonprofit'; });
    var pm  = partners.filter(function(p){ return p.partner_type === 'property_manager'; });
    host.innerHTML = grp('Non-profits', non) + grp('Property Managers', pm);

    host.querySelectorAll('.cr-chub-prow').forEach(function(row){
      row.onclick = function(){
        var pid = row.dataset.pid;
        var p = window.CardinalCommunityPartners.get(pid);
        var jobs = byPid[pid] || [];
        openList((p ? p.name : 'Partner') + ' \u2014 Active Jobs', jobs);
      };
    });
  }

  // ── Drilldown modal ───────────────────────────────────────
  function openList(title, projs){
    closeShell();
    var host = document.createElement('div');
    host.className = 'cr-chub-shell';
    var rows = projs.length ? projs.map(function(p){
      var addr = p.address || (p.location && p.location.street) || '';
      var stg  = LABEL[p.stage] || p.stage || '';
      return '<div class="prow" data-id="' + esc(p.id) + '">' +
               '<div>' +
                 '<div class="n">' + esc(p.name || 'Unnamed') + '</div>' +
                 (addr ? '<div class="m">' + esc(addr) + '</div>' : '') +
               '</div>' +
               '<span class="stg">' + esc(stg) + '</span>' +
             '</div>';
    }).join('') : '<div class="cr-chub-empty">Nothing here yet.</div>';

    host.innerHTML =
      '<div class="cr-chub-box">' +
        '<div class="cr-chub-mhd">' +
          '<h3>' + esc(title) + '</h3>' +
          '<button class="cr-chub-mx" aria-label="Close">&times;</button>' +
        '</div>' +
        '<div class="cr-chub-mbd">' + rows + '</div>' +
      '</div>';
    document.body.appendChild(host);
    host.querySelector('.cr-chub-mx').onclick = closeShell;
    host.addEventListener('click', function(e){ if(e.target === host) closeShell(); });
    host.querySelectorAll('.prow').forEach(function(row){
      row.onclick = function(){
        var id = row.dataset.id;
        closeShell();
        hide();   // hide the hub so openProject's view swap lands cleanly
        if(typeof window.openProject === 'function') window.openProject(id);
      };
    });
  }
  function closeShell(){
    var s = document.querySelector('.cr-chub-shell');
    if(s) s.parentNode.removeChild(s);
  }

  // ── Render clients list (Community's own client directory) ────
  function clientRowHtml(pr){
    var addr = pr.address || (pr.location && pr.location.street) || '';
    var stg  = LABEL[pr.stage] || pr.stage || '';
    return '<div class="cr-chub-clrow" data-id="' + esc(pr.id) + '">' +
             '<div>' +
               '<div class="cn">' + esc(pr.name || 'Unnamed') + '</div>' +
               (addr ? '<div class="cm">' + esc(addr) + '</div>' : '') +
             '</div>' +
             '<span class="cs">' + esc(stg) + '</span>' +
           '</div>';
  }
  function wireClientRows(host){
    host.querySelectorAll('.cr-chub-clrow').forEach(function(row){
      row.onclick = function(){
        var id = row.dataset.id;
        hide();
        if(typeof window.openProject === 'function') window.openProject(id);
      };
    });
  }
  function sortByRecent(a, b){
    return String(b.updated_at || b.created_at || '')
             .localeCompare(String(a.updated_at || a.created_at || ''));
  }
  function renderClients(projs){
    var host = document.getElementById('chubClientsBody');
    if(!host) return;
    var totalEl = document.getElementById('chubClientsTotal');
    if(totalEl) totalEl.textContent = projs.length ? (projs.length + ' total') : '';

    var searchEl = document.getElementById('chubClientsSearch');
    var q = (searchEl && searchEl.value || '').trim().toLowerCase();

    if(!projs.length){
      host.innerHTML = '<div class="cr-chub-empty">No community clients yet.' +
        '<small>Open any client and tap the type chip to convert them to Community.</small></div>';
      return;
    }

    // Search: flat filtered listing, ungrouped
    if(q){
      var matches = projs.filter(function(p){
        var s = (p.name || '') + ' ' +
                (p.address || '') + ' ' +
                ((p.location && p.location.street) || '') + ' ' +
                (p.phone || '');
        return s.toLowerCase().indexOf(q) !== -1;
      }).sort(sortByRecent);
      if(!matches.length){
        host.innerHTML = '<div class="cr-chub-empty">No matches.</div>';
        return;
      }
      host.innerHTML = matches.map(clientRowHtml).join('');
      wireClientRows(host);
      return;
    }

    // Grouped: partner_type -> partner -> clients, with Unassigned last
    var partners = (window.CardinalCommunityPartners && window.CardinalCommunityPartners.list()) || [];
    var partnerById = {};
    partners.forEach(function(p){ partnerById[p.id] = p; });

    var byPid = {};
    var unassigned = [];
    projs.forEach(function(pr){
      var pid = partnerIdOf(pr);
      if(pid && partnerById[pid]) (byPid[pid] = byPid[pid] || []).push(pr);
      else                        unassigned.push(pr);
    });
    Object.keys(byPid).forEach(function(k){ byPid[k].sort(sortByRecent); });
    unassigned.sort(sortByRecent);

    function typeGroup(label, arr){
      var withClients = arr.filter(function(p){ return byPid[p.id] && byPid[p.id].length; });
      if(!withClients.length) return '';
      var html = '<div class="cr-chub-clgroup"><h4>' + esc(label) + '</h4>';
      withClients.forEach(function(p){
        var jobs = byPid[p.id];
        html += '<div class="cr-chub-clpartner">' +
                  '<span class="pn">' + esc(p.name) + '</span>' +
                  '<span class="pc">' + jobs.length + '</span>' +
                '</div>';
        jobs.forEach(function(pr){ html += clientRowHtml(pr); });
      });
      html += '</div>';
      return html;
    }
    var nonProfits = partners.filter(function(p){ return p.partner_type === 'nonprofit';        });
    var pmgrs      = partners.filter(function(p){ return p.partner_type === 'property_manager'; });

    var html = '';
    html += typeGroup('Non-profits',       nonProfits);
    html += typeGroup('Property Managers', pmgrs);
    if(unassigned.length){
      html += '<div class="cr-chub-clgroup"><h4>Unassigned</h4>' +
              '<div class="cr-chub-clhint">Community clients without a partner attached. ' +
                'Open a client and use the Partner row to link one.</div>' +
              unassigned.map(clientRowHtml).join('') +
              '</div>';
    }
    if(!html){
      host.innerHTML = '<div class="cr-chub-empty">No community clients yet.</div>';
      return;
    }
    host.innerHTML = html;
    wireClientRows(host);
  }

  // ── Show / hide ───────────────────────────────────────────
  function show(){
    wrapHideAll();
    if(typeof window.hideAllViews === 'function') window.hideAllViews();
    var v = ensureView();
    v.style.display = 'block';
    render();
    // scroll to top
    try{ window.scrollTo({ top:0, behavior:'instant' }); }catch(e){ window.scrollTo(0,0); }
  }
  function hide(){
    var v = document.getElementById('communityHubView');
    if(v) v.style.display = 'none';
  }

  function render(){
    var projs = communityProjects();
    renderPipeline(projs);
    renderNeedsAttention(projs);
    // partners may still be loading — kick a load then render the two
    // sections that depend on partner data
    if(window.CardinalCommunityPartners){
      window.CardinalCommunityPartners.load().then(function(){
        renderPartners(projs);
        renderClients(projs);
      });
    }else{
      renderPartners(projs);
      renderClients(projs);
    }
  }

  // ── Wrap hideAllViews so navigation hides us cleanly ──────
  function wrapHideAll(){
    if(typeof window.hideAllViews !== 'function') return;
    if(window.hideAllViews.__crChub) return;
    var orig = window.hideAllViews;
    var wrapped = function(){
      var out = orig.apply(this, arguments);
      hide();
      return out;
    };
    wrapped.__crChub = true;
    window.hideAllViews = wrapped;
  }

  // ── Menu integration ──────────────────────────────────────
  function ensureMenuOption(){
    var menu = document.getElementById('navMenu') || document.querySelector('#navMenu, .navmenu');
    if(!menu) return;
    var portal = null;
    try{ portal = window.CardinalPortal && window.CardinalPortal.get(); }catch(_){ }
    var wanted = (portal === 'community' || portal === 'all');
    var existing = menu.querySelector('[data-nav="communityhub"]');
    if(wanted && !existing){
      var btn = document.createElement('button');
      btn.className = 'navopt';
      btn.setAttribute('data-nav', 'communityhub');
      btn.innerHTML = '\uD83C\uDFD8\uFE0F Community';
      btn.onclick = function(e){
        e.stopPropagation();
        // close the menu the way other navopts do
        var m = document.getElementById('navMenu');
        if(m) m.style.display = 'none';
        show();
      };
      // insert before the "Community Partners" entry if it exists, else append
      var partnersEntry = menu.querySelector('[data-nav="community-partners"]');
      if(partnersEntry) menu.insertBefore(btn, partnersEntry);
      else              menu.appendChild(btn);
    }else if(!wanted && existing){
      existing.parentNode.removeChild(existing);
    }
  }

  // ── React to portal switches ──────────────────────────────
  function onPortalChange(){
    // If we're currently showing but the portal is no longer community/all,
    // don't stay on screen.
    var v = document.getElementById('communityHubView');
    if(!v || v.style.display === 'none') return;
    var portal = null;
    try{ portal = window.CardinalPortal && window.CardinalPortal.get(); }catch(_){ }
    if(portal !== 'community' && portal !== 'all') hide();
  }

  // ── Boot ──────────────────────────────────────────────────
  var ticking = false;
  function tick(){
    if(ticking) return;
    ticking = true;
    try{
      ensureMenuOption();
      onPortalChange();
      // if hub is visible, re-render so counts stay fresh
      var v = document.getElementById('communityHubView');
      if(v && v.style.display !== 'none') render();
    } finally { ticking = false; }
  }
  var scheduled = false;
  function schedule(){
    if(scheduled) return;
    scheduled = true;
    requestAnimationFrame(function(){ scheduled = false; tick(); });
  }
  function start(){
    tick();
    new MutationObserver(schedule).observe(document.body, { childList:true, subtree:true });
    var n = 0, iv = setInterval(function(){ tick(); if(++n > 20) clearInterval(iv); }, 300);
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();

  window.CardinalCommunityHub = {
    show: show, hide: hide, render: render,
    isOpen: function(){
      var v = document.getElementById('communityHubView');
      return !!(v && v.style.display !== 'none');
    }
  };
})();
</script>
