<!--
════════════════════════════════════════════════════════════════════
 CARDINAL — COMMUNITY HUB
 v2026-07-23 · Community's own dashboard view
────────────────────────────────────────────────────────────────────
 The Community CRM's landing surface. Mirrors the pattern used by
 Cardinal Truth for Insurance — a full-view section injected into
 the DOM, shown/hidden via hideAllViews() coordination.

 LAYOUT (top to bottom)
   1. Community banner (green/beige, matches portal palette)
   2. PIPELINE STRIP — sticky at top of the view, counts per stage
      in bidding vocabulary (Bid Requested / Submitted / Awarded …)
   3. NEEDS ATTENTION card — Bids to submit, bids awaiting decision,
      awards to schedule. Each row opens a drilldown modal with the
      matching projects.
   4. PARTNERS grid — grouped by non-profit vs property manager,
      active-job count per partner. Clicking a partner opens a
      drilldown modal with their active projects. "Manage Partners"
      tile opens the directory.

 DATA
   Pulled from window.cacheProjects filtered to projClaimType ==
   'community', joined against window.CardinalCommunityPartners.
   No new tables, no new Supabase queries.

 NAV
   Adds a "Community" nav option to the burger menu when the current
   portal is Community or All. Clicking shows the hub. Uses the app's
   existing hideAllViews() so navigating anywhere else hides the hub
   cleanly.

 INSTALL: paste after community_stages.html. No SQL required.
════════════════════════════════════════════════════════════════════
-->

<script id="cr-chub-script">
(function () {
  'use strict';

  // Stored -> display label (matches community_stages.html)
  var LABEL = {
    'Lead':'Bid Requested', 'Prospect':'Bid Submitted', 'Approved':'Awarded',
    'Scheduled':'Scheduled', 'Completed':'Build Complete', 'Invoiced':'Invoiced',
    'Closed':'Closed', 'Lost':'Not Awarded'
  };
  var STAGES_SHOW = ['Lead','Prospect','Approved','Scheduled','Completed','Invoiced'];

  function esc(s){
    return String(s == null ? '' : s).replace(/[<>&"']/g, function(c){
      return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function typeLabel(t){
    return t === 'property_manager' ? 'Property Manager' : t === 'nonprofit' ? 'Non-profit' : t;
  }
  function projClaimType(pr){
    try{ return window.projClaimType ? window.projClaimType(pr) : 'unknown'; }
    catch(e){ return 'unknown'; }
  }
  function partnerIdOf(pr){
    try{
      var ck = window.parseCkAll ? window.parseCkAll(pr) : {};
      return (ck && ck.lead && ck.lead.partner_id) || null;
    }catch(e){ return null; }
  }
  function isActive(pr){

  // ── Render pipeline strip ─────────────────────────────────
  function renderPipeline(projs){
    var host = document.getElementById('chubPipe');
    if(!host) return;
    var counts = {};
    projs.forEach(function(p){ counts[p.stage] = (counts[p.stage] || 0) + 1; });
    host.innerHTML = STAGES_SHOW.map(function(s){
      var n = counts[s] || 0;
      return '<div class="cr-chub-pcell' + (n ? ' active' : '') + '" data-stage="' + esc(s) + '">' +
               '<div class="k">' + esc(LABEL[s] || s) + '</div>' +
               '<div class="v' + (n ? '' : ' zero') + '">' + n + '</div>' +
             '</div>';
    }).join('');
    host.querySelectorAll('.cr-chub-pcell').forEach(function(cell){
      cell.onclick = function(){
        var stage = cell.dataset.stage;
        var matches = projs.filter(function(p){ return p.stage === stage; });
        openList(LABEL[stage] || stage, matches);
      };

  // ── Render needs-attention card ───────────────────────────
  function renderNeedsAttention(projs){
    var host = document.getElementById('chubAttnBody');
    if(!host) return;
    var toSubmit = projs.filter(function(p){ return p.stage === 'Lead'; });
    var awaiting = projs.filter(function(p){ return p.stage === 'Prospect'; });
    var toSched  = projs.filter(function(p){ return p.stage === 'Approved'; });
    var rows = [
      { key:'submit',  title:'Bids to submit',        desc:'Prep and send the bid package',            list:toSubmit, threshold:STALE_DAYS.Lead     },
      { key:'waiting', title:'Bids awaiting decision', desc:'Follow up if it\u2019s been a while',     list:awaiting, threshold:STALE_DAYS.Prospect },
      { key:'sched',   title:'Awards to schedule',     desc:'Get these on the production calendar',    list:toSched,  threshold:STALE_DAYS.Approved },
    ];
    function oldestDays(list){
      return list.reduce(function(m, p){ return Math.max(m, daysInStage(p)); }, 0);
    }
    host.innerHTML = rows.map(function(r){
      var n = r.list.length;
      var oldest = oldestDays(r.list);
      var stale  = (n && oldest >= r.threshold);
      return '<div class="cr-chub-nrow' + (n ? '' : ' done') + '" data-key="' + r.key + '">' +
               '<div>' +
                 '<div class="nk">' + esc(r.title) +
                   (stale ? '<span class="noldest">Oldest ' + oldest + 'd</span>' : '') +
                 '</div>' +
                 '<div class="ndesc">' + esc(r.desc) + '</div>' +
               '</div>' +
               '<div class="nv' + (n ? '' : ' zero') + '">' + n + '</div>' +
             '</div>';
    }).join('');
    host.querySelectorAll('.cr-chub-nrow').forEach(function(row){
      row.onclick = function(){
        var r = rows.filter(function(x){ return x.key === row.dataset.key; })[0];
        if(!r) return;
        openList(r.title, r.list);
      };
    });
  }

  function closeShell(){
    var s = document.querySelector('.cr-chub-shell');
    if(s) s.parentNode.removeChild(s);
  }

  // Stale thresholds by stage (days) — how long is too long before we flag it
  var STALE_DAYS = {
    'Lead':      7,   // Bid Requested: shouldn't sit unbid for more than a week
    'Prospect':  21,  // Bid Submitted: 3 weeks is our tolerance for a decision
    'Approved':  14,  // Awarded but not scheduled: two weeks is generous
    'Scheduled': 30,  // Scheduled but not built: something's off after a month
    'Completed': 14,  // Build complete but not invoiced: finish the paperwork
    'Invoiced':  60,  // Awaiting payment: 60d is when it starts hurting
  };

  function daysInStage(pr){
    try{
      var ck = window.parseCkAll ? window.parseCkAll(pr) : {};
      var iso = ck.stage_since || pr.updated_at || pr.created_at;
      if(!iso) return 0;
      return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
    }catch(e){ return 0; }
  }
  function ageLabel(pr){
    try{
      var ck = window.parseCkAll ? window.parseCkAll(pr) : {};
      var iso = ck.stage_since || pr.updated_at || pr.created_at;
      if(!iso) return '';
      if(typeof window.stageAgo === 'function') return window.stageAgo(iso);
      return '';
    }catch(e){ return ''; }
  }
  function ageClass(pr){
    var d = daysInStage(pr);
    var t = STALE_DAYS[pr.stage];
    if(!t) return '';
    if(d >= t * 2) return 'hot';       // twice the threshold — really bad
    if(d >= t)     return 'stale';     // over the threshold — flag it
    return '';
  }

  // ── Appointment cache (Work Schedule + Mini Calendar) ─────
  var APPT_CACHE = null;
  var APPT_PROMISE = null;
  async function loadCommunityAppointments(){
    if(APPT_CACHE) return APPT_CACHE;
    if(APPT_PROMISE) return APPT_PROMISE;
    var projs = communityProjects();
    var ids = projs.map(function(p){ return p.id; });
    if(!ids.length){ APPT_CACHE = []; return APPT_CACHE; }
    var client = window.supa || null;
    if(!client){ APPT_CACHE = []; return APPT_CACHE; }
    APPT_PROMISE = (async function(){
      try{
        var since = new Date();
        since.setDate(since.getDate() - 7);
        var sinceStr = since.toISOString().slice(0,10);
        var r = await client.from('appointments')
          .select('id,title,appt_date,appt_time,project_id,notes,kind')
          .in('project_id', ids)
          .gte('appt_date', sinceStr)
          .order('appt_date', { ascending:true })
          .order('appt_time', { ascending:true })
          .limit(100);
        APPT_CACHE = r.data || [];
      }catch(e){ APPT_CACHE = []; }
      finally{ APPT_PROMISE = null; }
      return APPT_CACHE;
    })();
    return APPT_PROMISE;
  }
  function invalidateAppts(){ APPT_CACHE = null; }

  // ── Render Work Schedule ─────────────────────────────────
  function renderSchedule(appointments){
    var host = document.getElementById('chubSchedBody');
    if(!host) return;
    var todayIso = new Date().toISOString().slice(0,10);
    var upcoming = (appointments || []).filter(function(a){
      return a.appt_date && a.appt_date >= todayIso;
    }).slice(0, 6);

    var t = document.getElementById('chubSchedTotal');
    if(t) t.textContent = upcoming.length ? ('next ' + upcoming.length) : '';

    if(!upcoming.length){
      host.innerHTML = '<div class="cr-chub-empty">Nothing scheduled.' +
        '<small>Add an appointment from a client profile to see it here.</small></div>';
      return;
    }
    var projById = {};
    (window.cacheProjects || []).forEach(function(p){ projById[p.id] = p; });

    host.innerHTML = upcoming.map(function(a){
      var d = new Date(a.appt_date + 'T00:00:00');
      var mon = d.toLocaleDateString('en-US', { month:'short' });
      var day = d.getDate();
      var timeLbl = a.appt_time ? fmtTime(a.appt_time) : 'All day';
      var pr = projById[a.project_id];
      var who = pr ? (pr.name || 'Unnamed') : '';
      var title = a.title || (a.kind ? a.kind.replace(/_/g,' ') : 'Appointment');
      return '<div class="cr-chub-schrow" data-id="' + esc(a.project_id) + '">' +
               '<div class="schdate"><div class="m">' + esc(mon) + '</div>' +
                 '<div class="d">' + day + '</div></div>' +
               '<div class="schbody">' +
                 '<div class="schtitle">' + esc(title) + '</div>' +
                 (who ? '<div class="schmeta">' + esc(who) + '</div>' : '') +
               '</div>' +
               '<div class="schtime">' + esc(timeLbl) + '</div>' +
             '</div>';
    }).join('');
    host.querySelectorAll('.cr-chub-schrow').forEach(function(row){
      row.onclick = function(){
        var id = row.dataset.id;
        hide();
        if(typeof window.openProject === 'function') window.openProject(id);
      };
    });
  }
  function fmtTime(t){
    if(!t) return '';
    // Accept HH:MM or HH:MM:SS
    var m = String(t).match(/^(\d{1,2}):(\d{2})/);
    if(!m) return t;
    var h = parseInt(m[1], 10);
    var mn = m[2];
    var ampm = h >= 12 ? 'PM' : 'AM';
    var h12 = ((h + 11) % 12) + 1;
    return h12 + ':' + mn + ' ' + ampm;
  }

  // ── Render Accounts Receivable ───────────────────────────
  function renderAR(projs){
    var host = document.getElementById('chubARBody');
    if(!host) return;
    if(typeof window.jobFinance !== 'function'){
      host.innerHTML = '<div class="cr-chub-empty">Job finance unavailable.</div>';
      return;
    }
    var rows = [];
    var total = 0;
    projs.forEach(function(pr){
      var fin;
      try{ fin = window.jobFinance(pr); }catch(e){ return; }
      if(!fin || !fin.balance || fin.balance <= 0) return;
      total += Number(fin.balance);
      rows.push({ pr: pr, balance: Number(fin.balance) });
    });
    rows.sort(function(a, b){ return b.balance - a.balance; });

    var html =
      '<div class="cr-chub-ar-total">' +
        '<div class="k">Outstanding</div>' +
        '<div class="v">' + money(total) + '</div>' +
        '<div class="sub">' + rows.length + ' client' + (rows.length === 1 ? '' : 's') + ' with a balance</div>' +
      '</div>';
    if(!rows.length){
      html += '<div class="cr-chub-empty" style="padding:12px 8px;">All caught up.</div>';
      host.innerHTML = html;
      return;
    }
    var top = rows.slice(0, 5);
    top.forEach(function(r){
      html += '<div class="cr-chub-arrow" data-id="' + esc(r.pr.id) + '">' +
                '<div class="n">' + esc(r.pr.name || 'Unnamed') + '</div>' +
                '<div class="b">' + money(r.balance) + '</div>' +
              '</div>';
    });
    if(rows.length > 5){
      html += '<div class="cr-chub-clhint" style="text-align:center;padding-top:6px;">' +
              '+ ' + (rows.length - 5) + ' more</div>';
    }
    host.innerHTML = html;
    host.querySelectorAll('.cr-chub-arrow').forEach(function(row){
      row.onclick = function(){
        var id = row.dataset.id;
        hide();
        if(typeof window.openProject === 'function') window.openProject(id);
      };
    });
  }

  // ── Render Mini Calendar ─────────────────────────────────
  function renderCalendar(appointments){
    var host = document.getElementById('chubCalBody');
    if(!host) return;
    var now = new Date();
    var year = now.getFullYear();
    var month = now.getMonth();
    var firstDay = new Date(year, month, 1);
    var startWeekday = firstDay.getDay();
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var todayDate = now.getDate();
    var monthKey = year + '-' + String(month + 1).padStart(2, '0');

    var eventDays = {};
    (appointments || []).forEach(function(a){
      if(!a.appt_date) return;
      if(a.appt_date.slice(0, 7) !== monthKey) return;
      var d = parseInt(a.appt_date.slice(8, 10), 10);
      if(d) eventDays[d] = (eventDays[d] || 0) + 1;
    });

    var monthLabel = firstDay.toLocaleDateString('en-US', { month:'long', year:'numeric' });
    var html = '<div class="cr-chub-caltitle">' + esc(monthLabel) + '</div>';
    html += '<div class="cr-chub-calgrid">';
    ['S','M','T','W','T','F','S'].forEach(function(w){
      html += '<div class="cal-dow">' + w + '</div>';
    });
    for(var i = 0; i < startWeekday; i++){
      html += '<div class="cal-day empty"></div>';
    }
    for(var d = 1; d <= daysInMonth; d++){
      var isToday = (d === todayDate);
      var has = !!eventDays[d];
      html += '<div class="cal-day' +
                (isToday ? ' today' : '') +
                (has ? ' has-events' : '') + '">' +
                '<span>' + d + '</span>' +
              '</div>';
    }
    html += '</div>';
    html += '<div class="cr-chub-callegend"><span class="dot"></span>appointment scheduled</div>';
    host.innerHTML = html;
  }

  // ── Render Activity Board ────────────────────────────────
  function renderActivity(projs){
    var host = document.getElementById('chubActivityBody');
    if(!host) return;
    var since = Date.now() - 30 * 86400000;
    var events = [];
    projs.forEach(function(pr){
      var ck = window.parseCkAll ? window.parseCkAll(pr) : {};
      // Stage change
      if(ck.stage_since){
        var t = new Date(ck.stage_since).getTime();
        if(t && t >= since){
          events.push({
            when: ck.stage_since, pr: pr, kind:'stage',
            text: 'Moved to ' + (LABEL[pr.stage] || pr.stage)
          });
        }
      }
      // Created (only if different from stage_since to avoid duplicates)
      if(pr.created_at && pr.created_at !== ck.stage_since){
        var t2 = new Date(pr.created_at).getTime();
        if(t2 && t2 >= since){
          events.push({
            when: pr.created_at, pr: pr, kind:'new',
            text: 'New community client added'
          });
        }
      }
      // Comments (notes / mentions)
      (ck.comments || []).forEach(function(c){
        if(!c || !c.at) return;
        var t3 = new Date(c.at).getTime();
        if(!t3 || t3 < since) return;
        var snippet = String(c.text || '').replace(/\s+/g,' ').trim().slice(0, 100);
        if(!snippet) return;
        events.push({
          when: c.at, pr: pr, kind:'comment',
          text: snippet
        });
      });
    });
    events.sort(function(a, b){
      return String(b.when).localeCompare(String(a.when));
    });
    events = events.slice(0, 10);

    if(!events.length){
      host.innerHTML = '<div class="cr-chub-empty">No recent activity.' +
        '<small>Stage moves, new leads, and notes on community clients show up here.</small></div>';
      return;
    }
    var icons = { stage:'\u21C4', 'new':'+', comment:'\uD83D\uDCAC' };
    host.innerHTML = events.map(function(e){
      return '<div class="cr-chub-actrow" data-id="' + esc(e.pr.id) + '">' +
               '<div class="aic ' + e.kind + '">' + icons[e.kind] + '</div>' +
               '<div class="abody">' +
                 '<div class="aname">' + esc(e.pr.name || 'Unnamed') + '</div>' +
                 '<div class="atext">' + esc(e.text) + '</div>' +
               '</div>' +
               '<div class="awhen">' + esc(fmtAgo(e.when)) + '</div>' +
             '</div>';
    }).join('');
    host.querySelectorAll('.cr-chub-actrow').forEach(function(row){
      row.onclick = function(){
        var id = row.dataset.id;
        hide();
        if(typeof window.openProject === 'function') window.openProject(id);
      };
    });
  }
  function fmtAgo(iso){
    try{
      var d = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
      if(d < 1) return 'Today';
      if(d === 1) return '1d';
      if(d < 14) return d + 'd';
      if(d < 60) return Math.floor(d / 7) + 'wk';
      return Math.floor(d / 30) + 'mo';
    }catch(e){ return ''; }
  }
  function money(n){
    return '$' + Number(n || 0).toLocaleString('en-US',
      { minimumFractionDigits:0, maximumFractionDigits:0 });
  }

  // ── Render clients list (Community's own client directory) ────
  function clientRowHtml(pr){
    var addr = pr.address || (pr.location && pr.location.street) || '';
    var stg  = LABEL[pr.stage] || pr.stage || '';
    var age  = ageLabel(pr);

    return '<div class="cr-chub-clrow" data-id="' + esc(pr.id) + '">' +
             '<div>' +
               '<div class="cn">' + esc(pr.name || 'Unnamed') + '</div>' +
               (addr ? '<div class="cm">' + esc(addr) + '</div>' : '') +
             '</div>' +
             '<div class="cr-chub-clright">' +
               '<span class="cs">' + esc(stg) + '</span>' +
               (age ? '<span class="cage' + (cls ? ' ' + cls : '') + '">' + esc(age) + '</span>' : '') +
             '</div>' +
           '</div>';
  }
  function wireClientRows(host){
    host.querySelectorAll('.cr-chub-clrow').forEach(function(row){
      row.onclick = function(){
        var id = row.dataset.id;
        hide();
        if(typeof window.openProject === 'function') window.openProject(id);
      };
    });
  }
  function sortByRecent(a, b){
    return String(b.updated_at || b.created_at || '')
             .localeCompare(String(a.updated_at || a.created_at || ''));
  }
  function renderClients(projs){
    var host = document.getElementById('chubClientsBody');
    if(!host) return;
    var totalEl = document.getElementById('chubClientsTotal');
    if(totalEl) totalEl.textContent = projs.length ? (projs.length + ' total') : '';

    var searchEl = document.getElementById('chubClientsSearch');
    var q = (searchEl && searchEl.value || '').trim().toLowerCase();

    if(!projs.length){
      host.innerHTML = '<div class="cr-chub-empty">No community clients yet.' +
        '<small>Open any client and tap the type chip to convert them to Community.</small></div>';
      return;
    }

    // Search: flat filtered listing, ungrouped
    if(q){
      var matches = projs.filter(function(p){
        var s = (p.name || '') + ' ' +
                (p.address || '') + ' ' +
                ((p.location && p.location.street) || '') + ' ' +
                (p.phone || '');
        return s.toLowerCase().indexOf(q) !== -1;
      }).sort(sortByRecent);
      if(!matches.length){
        host.innerHTML = '<div class="cr-chub-empty">No matches.</div>';
        return;
      }
      host.innerHTML = matches.map(clientRowHtml).join('');
      wireClientRows(host);
      return;
    }

    // Grouped: partner_type -> partner -> clients, with Unassigned last
    var partners = (window.CardinalCommunityPartners && window.CardinalCommunityPartners.list()) || [];
    var partnerById = {};
    partners.forEach(function(p){ partnerById[p.id] = p; });

    var byPid = {};
    var unassigned = [];
    projs.forEach(function(pr){
      var pid = partnerIdOf(pr);
      if(pid && partnerById[pid]) (byPid[pid] = byPid[pid] || []).push(pr);
      else                        unassigned.push(pr);
    });
    Object.keys(byPid).forEach(function(k){ byPid[k].sort(sortByRecent); });
    unassigned.sort(sortByRecent);

    function typeGroup(label, arr){
      var withClients = arr.filter(function(p){ return byPid[p.id] && byPid[p.id].length; });
      if(!withClients.length) return '';
      var html = '<div class="cr-chub-clgroup"><h4>' + esc(label) + '</h4>';
      withClients.forEach(function(p){
        var jobs = byPid[p.id];
        html += '<div class="cr-chub-clpartner">' +
                  '<span class="pn">' + esc(p.name) + '</span>' +
                  '<span class="pc">' + jobs.length + '</span>' +
                '</div>';
        jobs.forEach(function(pr){ html += clientRowHtml(pr); });
      });
      html += '</div>';
      return html;
    }
    var nonProfits = partners.filter(function(p){ return p.partner_type === 'nonprofit';        });
    var pmgrs      = partners.filter(function(p){ return p.partner_type === 'property_manager'; });

    var html = '';
    html += typeGroup('Non-profits',       nonProfits);
    html += typeGroup('Property Managers', pmgrs);
    if(unassigned.length){
      html += '<div class="cr-chub-clgroup"><h4>Unassigned</h4>' +
              '<div class="cr-chub-clhint">Community clients without a partner attached. ' +
                'Open a client and use the Partner row to link one.</div>' +
              unassigned.map(clientRowHtml).join('') +
              '</div>';
    }
    if(!html){
      host.innerHTML = '<div class="cr-chub-empty">No community clients yet.</div>';
      return;
    }
    host.innerHTML = html;
    wireClientRows(host);
  }

  // ── Show / hide ───────────────────────────────────────────
  function show(){
    wrapHideAll();
    if(typeof window.hideAllViews === 'function') window.hideAllViews();
    var v = ensureView();
    v.style.display = 'block';
    render();
    // scroll to top
    try{ window.scrollTo({ top:0, behavior:'instant' }); }catch(e){ window.scrollTo(0,0); }
  }
  function hide(){
    var v = document.getElementById('communityHubView');
    if(v) v.style.display = 'none';
  }

  function render(){
    var projs = communityProjects();
    renderPipeline(projs);
    renderNeedsAttention(projs);
    renderAR(projs);
    renderActivity(projs);
    // Appointment-driven sections load async — render synchronously first
    // (with cache if we have it) then again after the fetch resolves.
    var cached = APPT_CACHE;
    renderSchedule(cached || []);
    renderCalendar(cached || []);
    invalidateAppts();
    loadCommunityAppointments().then(function(appts){
      renderSchedule(appts);
      renderCalendar(appts);
    });
    // partners may still be loading — kick a load then render the two
    // sections that depend on partner data
    if(window.CardinalCommunityPartners){
      window.CardinalCommunityPartners.load().then(function(){
        renderPartners(projs);
        renderClients(projs);
      });
    }else{
      renderPartners(projs);
      renderClients(projs);
    }
  }

  // ── Wrap hideAllViews so navigation hides us cleanly ──────
  function wrapHideAll(){
    if(typeof window.hideAllViews !== 'function') return;
    if(window.hideAllViews.__crChub) return;
    var orig = window.hideAllViews;
    var wrapped = function(){
      var out = orig.apply(this, arguments);
      hide();
      return out;
    };
    wrapped.__crChub = true;
    window.hideAllViews = wrapped;
  }

  // ── Menu integration ──────────────────────────────────────
  function ensureMenuOption(){
    var menu = document.getElementById('navMenu') || document.querySelector('#navMenu, .navmenu');
    if(!menu) return;
    var portal = null;
    try{ portal = window.CardinalPortal && window.CardinalPortal.get(); }catch(_){ }
    var wanted = (portal === 'community' || portal === 'all');
    var existing = menu.querySelector('[data-nav="communityhub"]');
    if(wanted && !existing){
      var btn = document.createElement('button');
      btn.className = 'navopt';
      btn.setAttribute('data-nav', 'communityhub');
      btn.innerHTML = '\uD83C\uDFD8\uFE0F Community';
      btn.onclick = function(e){
        e.stopPropagation();
        // close the menu the way other navopts do
        var m = document.getElementById('navMenu');
        if(m) m.style.display = 'none';
        show();
      };
      // insert before the "Community Partners" entry if it exists, else append
      var partnersEntry = menu.querySelector('[data-nav="community-partners"]');
      if(partnersEntry) menu.insertBefore(btn, partnersEntry);
      else              menu.appendChild(btn);
    }else if(!wanted && existing){
      existing.parentNode.removeChild(existing);
    }
  }

  // ── React to portal switches ──────────────────────────────
  function onPortalChange(){
    // If we're currently showing but the portal is no longer community/all,
    // don't stay on screen.
    var v = document.getElementById('communityHubView');
    if(!v || v.style.display === 'none') return;
    var portal = null;
    try{ portal = window.CardinalPortal && window.CardinalPortal.get(); }catch(_){ }
    if(portal !== 'community' && portal !== 'all') hide();
  }

  // ── Boot ──────────────────────────────────────────────────
  var ticking = false;
  function tick(){
    if(ticking) return;
    ticking = true;
    try{
      ensureMenuOption();
      onPortalChange();
      // if hub is visible, re-render so counts stay fresh
      var v = document.getElementById('communityHubView');
      if(v && v.style.display !== 'none') render();
    } finally { ticking = false; }
  }
  var scheduled = false;
  function schedule(){
    if(scheduled) return;
    scheduled = true;
    requestAnimationFrame(function(){ scheduled = false; tick(); });
  }
  function start(){
    tick();
    new MutationObserver(schedule).observe(document.body, { childList:true, subtree:true });
    var n = 0, iv = setInterval(function(){ tick(); if(++n > 20) clearInterval(iv); }, 300);
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();

  window.CardinalCommunityHub = {
    show: show, hide: hide, render: render,
    isOpen: function(){
      var v = document.getElementById('communityHubView');
      return !!(v && v.style.display !== 'none');
    }
  };
})();
</script>
