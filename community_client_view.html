<!--
════════════════════════════════════════════════════════════════════
 CARDINAL — COMMUNITY CLIENT VIEW
 v2026-07-23 · per-client theme + bid strip
────────────────────────────────────────────────────────────────────
 The community equivalent of Cardinal Truth's per-client treatment
 (body.claim-insurance). When body.claim-community is set:

   • Body background flips to warm beige
   • Client profile card (.projinfo, .acxsec, .jabox, .dbrow) get
     the green/cream palette instead of retail red/gold
   • Site header takes the same pale-green paint the portal theme
     uses, but keyed to the client rather than the portal — so a
     community client accessed via a mention from another portal
     still reads "you are on a community client"

 Also injects a BID STRIP under the stage bar, mirroring the shape
 of insurance's claim strip:

   Bid Submitted  ·  Awarded  ·  Deposit Received  ·  Balance Due
   Progress bar + Log/Edit buttons

 Bid data lives at checklist.bid = { submitted_amount, submitted_at,
 awarded_amount, awarded_at }. Deposit/paid comes from jobFinance().

 The body.claim-community class is toggled by patches in the base
 index.html (three sites: openProject, showTab pre-reveal, and
 hideAllViews).

 INSTALL: paste after claims_form_fixes.html. No SQL required.
════════════════════════════════════════════════════════════════════
-->

<script id="cr-comclient-script">
(function () {
  'use strict';

  function esc(s){
    return String(s == null ? '' : s).replace(/[<>&"']/g, function(c){
      return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function money(n){
    return '$' + Number(n || 0).toLocaleString('en-US',
      { minimumFractionDigits:0, maximumFractionDigits:0 });
  }
  function onCommunity(){
    try{
      if(typeof window.projClaimType !== 'function') return false;
      var pr = window.currentProject;
      if(!pr) return false;
      return window.projClaimType(pr) === 'community';
    }catch(e){ return false; }
  }
  function bidOf(pr){
    try{
      var ck = window.parseCkAll ? window.parseCkAll(pr) : {};
      return ck.bid || null;
    }catch(e){ return null; }
  }
  async function saveBid(pr, next){
    if(!pr) return;
    try{
      var ck = window.parseCkAll ? window.parseCkAll(pr) : {};
      var b = Object.assign({}, ck.bid || {}, next);
      // strip nulls so we don't clutter storage
      Object.keys(b).forEach(function(k){ if(b[k] == null || b[k] === '') delete b[k]; });
      await window.patchProjectCk(pr, { bid: b });
      if(window.currentProject && window.currentProject.id === pr.id){
        renderBidStrip();
      }
      if(typeof window.auditLog === 'function'){
        window.auditLog('lead', 'Bid info updated', pr.id);
      }
    }catch(e){ console.warn('[bid-strip] save', e); alert('Could not save: ' + (e.message || e)); }
  }

  // ── COMMUNITY badge over the client name ─────────────────
  function ensureCommunityBadge(){
    if(!onCommunity()) return;
    var name = document.getElementById('projName');
    if(!name) return;
    if(name.querySelector('.comBadge')) return;
    // Only inject if there's no INSURANCE badge already (shouldn't happen)
    if(name.querySelector('.insBadge')) return;
    var badge = document.createElement('span');
    badge.className = 'comBadge';
    badge.innerHTML = '\uD83C\uDFD8\uFE0F COMMUNITY';
    name.insertBefore(badge, name.firstChild);
  }

  // ── Bid strip ────────────────────────────────────────────
  var lastPid = null;
  function renderBidStrip(){
    if(!onCommunity()){
      var e = document.querySelector('.cr-bidstrip');
      if(e) e.remove();
      lastPid = null;
      return;
    }
    var bar = document.querySelector('.dbstage');
    if(!bar) return;
    var pr = window.currentProject;
    if(!pr) return;

    var host = document.querySelector('.cr-bidstrip');
    if(host && host.dataset.pid === pr.id){
      // just re-render inside the same host
    }else{
      if(host) host.remove();
      host = document.createElement('div');
      host.className = 'cr-bidstrip';
      host.dataset.pid = pr.id;
      bar.insertAdjacentElement('afterend', host);
    }

    var bid = bidOf(pr) || {};
    var submitted = Number(bid.submitted_amount || 0);
    var awarded   = Number(bid.awarded_amount   || 0);

    var fin = (typeof window.jobFinance === 'function') ? window.jobFinance(pr) : { value:0, paid:0, balance:0, pct:0 };
    var paid = Number(fin.paid || 0);

    // Basis for balance: prefer awarded → submitted → contract value
    var basis   = awarded || submitted || Number(fin.value || 0);
    var outstanding = Math.max(0, basis - paid);
    var pct     = basis > 0 ? Math.min(100, Math.round(paid / basis * 100)) : 0;

    if(!submitted && !awarded && !fin.value){
      host.className = 'cr-bidstrip empty';
      host.innerHTML =
        '<div class="hd"><span class="lbl">\uD83E\uDD1D Bid</span></div>' +
        '<div class="msg">No bid info yet \u2014 log the amount submitted and, once you know it, the amount awarded.</div>' +
        '<div class="acts">' +
          '<button data-act="log-sub">+ Log Bid Submitted</button>' +
          '<button data-act="log-awd" class="ghost">+ Log Awarded</button>' +
        '</div>';
      wireActs(host, pr);
      return;
    }

    host.className = 'cr-bidstrip';
    host.innerHTML =
      '<div class="hd">' +
        '<span class="lbl">\uD83E\uDD1D Bid</span>' +
        (bid.submitted_at
          ? '<span class="who">Submitted ' + esc(fmtDate(bid.submitted_at)) + '</span>'
          : '') +
      '</div>' +
      '<div class="grid">' +
        '<div class="cell"><div class="k">Bid Submitted</div>' +
          '<div class="v' + (submitted ? '' : ' muted') + '">' + (submitted ? money(submitted) : '—') + '</div></div>' +
        '<div class="cell"><div class="k">Awarded</div>' +
          '<div class="v' + (awarded ? ' pos' : ' muted') + '">' + (awarded ? money(awarded) : '—') + '</div></div>' +
        '<div class="cell"><div class="k">Received</div>' +
          '<div class="v">' + money(paid) + '</div></div>' +
        '<div class="cell"><div class="k">Outstanding</div>' +
          '<div class="v' + (outstanding > 0 ? ' neg' : ' pos') + '">' + money(outstanding) + '</div></div>' +
      '</div>' +
      '<div class="bar"><i style="width:' + pct + '%;"></i></div>' +
      '<div class="foot">' +
        '<span><b>' + money(paid) + '</b> of ' + money(basis) + ' \u00b7 ' + pct + '%</span>' +
        (awarded && submitted && awarded !== submitted
          ? '<span>' + (awarded < submitted ? 'Adjusted down' : 'Adjusted up') + ' ' +
              money(Math.abs(awarded - submitted)) + '</span>'
          : '') +
      '</div>' +
      '<div class="acts">' +
        '<button data-act="log-sub" class="ghost">' + (submitted ? 'Edit Submitted' : '+ Log Submitted') + '</button>' +
        '<button data-act="log-awd" class="ghost">' + (awarded ? 'Edit Awarded' : '+ Log Awarded') + '</button>' +
      '</div>';
    wireActs(host, pr);
  }
  function wireActs(host, pr){
    var s = host.querySelector('[data-act="log-sub"]');
    if(s) s.onclick = function(){ promptForBid(pr, 'submitted'); };
    var a = host.querySelector('[data-act="log-awd"]');
    if(a) a.onclick = function(){ promptForBid(pr, 'awarded'); };
  }
  function promptForBid(pr, kind){
    var bid = bidOf(pr) || {};
    var cur = kind === 'submitted' ? bid.submitted_amount : bid.awarded_amount;
    var label = kind === 'submitted' ? 'Bid Submitted' : 'Amount Awarded';
    var v = prompt(label + ' ($):', cur != null ? String(cur) : '');
    if(v == null) return;
    v = String(v).replace(/[\$,\s]/g, '');
    if(v === ''){
      // clear the field
      var patch = {};
      patch[kind + '_amount'] = null;
      patch[kind + '_at']     = null;
      saveBid(pr, patch);
      return;
    }
    var n = parseFloat(v);
    if(isNaN(n) || n < 0){ alert('That doesn\'t look like a dollar amount.'); return; }
    var patch = {};
    patch[kind + '_amount'] = +n.toFixed(2);
    patch[kind + '_at']     = (bid[kind + '_at']) || new Date().toISOString();
    saveBid(pr, patch);
  }
  function fmtDate(iso){
    if(!iso) return '';
    try{
      var d = new Date(iso);
      if(isNaN(d.getTime())) return '';
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }catch(e){ return ''; }
  }

  // ── Wrap renderOverview so we run after each profile render ─
  function hook(){
    if(typeof window.renderOverview !== 'function') return false;
    if(window.renderOverview.__crCommClient) return true;
    var orig = window.renderOverview;
    var wrapped = function(){
      var out = orig.apply(this, arguments);
      try{
        if(onCommunity()){
          ensureCommunityBadge();
          renderBidStrip();
        }else{
          var e = document.querySelector('.cr-bidstrip');
          if(e) e.remove();
        }
      }catch(err){ console.warn('[com-client]', err); }
      return out;
    };
    wrapped.__crCommClient = true;
    window.renderOverview = wrapped;
    return true;
  }

  function start(){
    var n = 0;
    var iv = setInterval(function(){
      if(hook() || ++n > 40) clearInterval(iv);
    }, 150);
    // MutationObserver catches profile renders from other paths
    var ticking = false;
    new MutationObserver(function(){
      if(ticking) return;
      ticking = true;
      requestAnimationFrame(function(){
        ticking = false;
        try{
          if(onCommunity()){ ensureCommunityBadge(); renderBidStrip(); }
        }catch(e){}
      });
    }).observe(document.body, { childList:true, subtree:true });
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();

  window.CardinalCommunityClient = {
    renderBidStrip: renderBidStrip,
    saveBid: saveBid,
  };
})();
</script>
